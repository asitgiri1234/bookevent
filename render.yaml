# Render blueprint for the BookEvent backend (Express + MongoDB API).
# In Render: New → Blueprint → connect this repo. It reads this file.
# Fill the env var values in the Render dashboard (they're marked sync:false).
services:
  - type: web
    name: bookevent-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # Optional: lock CORS to your Vercel URL, e.g. https://bookevent.vercel.app
      - key: CLIENT_URL
        sync: false
